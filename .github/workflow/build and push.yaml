name: Build and Push React App to ACR

on:
  push:
    branches:
      - main   # change if your default branch is master

jobs:
  build-and-push:
    runs-on: self-hosted   # 👈 using your self-hosted agent

    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Log in to Azure using service principal
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3: Log in to ACR
      - name: ACR Login
        run: |
          az acr login --name <your-acr-name>

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t <your-acr-name>.azurecr.io/microtodoui:${{ github.sha }} .

      # Step 5: Push Docker image to ACR
      - name: Push Docker image
        run: |
          docker push <your-acr-name>.azurecr.io/microtodoui:${{ github.sha }}
