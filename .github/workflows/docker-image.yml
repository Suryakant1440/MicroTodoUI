name: Docker Image CI

on:
  push:
    branches: 
      - main
jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    
    - name: Azure Login
      uses: Azure/login@v3
      with:
     
        client-id: ${{ secrets.ARM_CLIENT_ID }}
        tenant-id: ${{ secrets.ARM_TENANT_ID }}
        subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    - name: ACR Login
      run: |
        az acr login --name $ACR_NAME        
      
    - name: Build the Docker image
      run: docker build $IMAGE_NAME:$IMAGE_TAG .
    - name: Tag docker image
      run: |
        docker tag $IMAGE_NAME:$IMAGE_TAG $ACR_SERVER_LOGIN/$IMAGE_NAME:$IMAGE_TAG
    - name: Image push
      run: |
        docker push $ACR_SERVER_LOGIN/$IMAGE_NAME:$IMAGE_TAG 
   
