name: Docker Image CI

on:
  push:
    branches: 
      - main

jobs:
  build:
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure Login (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.ARM_CLIENT_ID }}
        tenant-id: ${{ secrets.ARM_TENANT_ID }}
        subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

    - name: ACR Login
      run: az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.IMAGE_NAME }}:${{ github.run_number }} .

    - name: Tag Docker image (registry + run_number)
      run: docker tag ${{ secrets.IMAGE_NAME }}:${{ github.run_number }} ${{ secrets.ACR_SERVER_LOGIN }}/${{ secrets.IMAGE_NAME }}:${{ github.run_number }}

    - name: Tag Docker image (latest)
      run: docker tag ${{ secrets.IMAGE_NAME }}:${{ github.run_number }} ${{ secrets.ACR_SERVER_LOGIN }}/${{ secrets.IMAGE_NAME }}:latest

    - name: Push Docker image
      run: |
        docker push ${{ secrets.ACR_SERVER_LOGIN }}/${{ secrets.IMAGE_NAME }}:${{ github.run_number }}
        docker push ${{ secrets.ACR_SERVER_LOGIN }}/${{ secrets.IMAGE_NAME }}:latest
